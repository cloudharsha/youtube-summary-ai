name: Video Transcription

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL to transcribe'
        required: true
        type: string

jobs:
  transcribe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      - name: Extract video ID
        id: video_id
        run: |
          python -c "
          import re
          import sys
          url = '${{ inputs.video_url }}'
          patterns = [
              r'(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)',
              r'youtube\.com\/watch\?.*v=([^&\n?#]+)'
          ]
          for pattern in patterns:
              match = re.search(pattern, url)
              if match:
                  print(match.group(1))
                  sys.exit(0)
          print('INVALID_URL')
          sys.exit(1)
          " > video_id.txt
          echo "video_id=$(cat video_id.txt)" >> $GITHUB_OUTPUT

      - name: Transcribe video using yt-dlp
        id: transcribe
        run: |
          python -c "
          import yt_dlp
          import sys

          url = '${{ inputs.video_url }}'
          video_id = '${{ steps.video_id.outputs.video_id }}'

          if video_id == 'INVALID_URL':
              print('Error: Invalid YouTube URL')
              sys.exit(1)

          try:
              ydl_opts = {
                  'quiet': True,
                  'no_warnings': True,
                  'writesubtitles': True,
                  'writeautomaticsub': True,
                  'subtitleslangs': ['en'],
                  'skip_download': True,
              }

              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  info = ydl.extract_info(url, download=False)

                  # Try to get subtitles
                  subtitles = info.get('subtitles', {})
                  auto_subs = info.get('automatic_captions', {})

                  # Prefer manual subtitles, fall back to auto-generated
                  sub_data = subtitles.get('en', []) or auto_subs.get('en', [])

                  if not sub_data:
                      print('Error: No subtitles available for this video')
                      sys.exit(1)

                  # Download the subtitle file
                  sub_url = sub_data[0]['url']

                  import requests
                  response = requests.get(sub_url)
                  response.raise_for_status()

                  # Parse WebVTT format and extract text
                  import re
                  vtt_content = response.text

                  # Remove WebVTT header and timestamps
                  lines = vtt_content.split('\n')
                  text_lines = []

                  for line in lines:
                      # Skip timestamps, empty lines, and WebVTT metadata
                      if re.match(r'^\d{2}:', line) or line.strip() == '' or line.startswith('WEBVTT') or line.startswith('Kind:') or line.startswith('Language:'):
                          continue
                      # Remove HTML tags and clean up
                      clean_line = re.sub(r'<[^>]+>', '', line)
                      if clean_line.strip():
                          text_lines.append(clean_line.strip())

                  text = ' '.join(text_lines)

                  # Limit transcript size
                  max_length = 100000
                  if len(text) > max_length:
                      text = text[:max_length] + '...'

                  # Write to file
                  with open('transcription.txt', 'w', encoding='utf-8') as f:
                      f.write(text)

                  print(f'Successfully transcribed video ({len(text)} characters)')

          except Exception as e:
              print(f'Error: {str(e)}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Upload transcription as artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcription-${{ steps.video_id.outputs.video_id }}
          path: transcription.txt
          retention-days: 0
          expiration: 1 hour

      - name: Display transcription summary
        run: |
          echo "=== Transcription Summary ==="
          echo "Video ID: ${{ steps.video_id.outputs.video_id }}"
          echo "Video URL: ${{ inputs.video_url }}"
          echo "Character count: $(wc -c < transcription.txt)"
          echo "Word count: $(wc -w < transcription.txt)"
          echo ""
          echo "First 500 characters:"
          head -c 500 transcription.txt
          echo ""
          echo "..."
          echo ""
          echo "Full transcription available as artifact"
